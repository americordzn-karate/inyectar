
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asignar Retos | Senshi-Kan</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#111;
    color:white;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:25px;
    color:#f7c600;
}

.card{
    background:#1b1b1b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    border:1px solid #333;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input[type="text"],
input[type="number"]{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:20px;
    font-size:16px;
}

.search-box{
    margin-bottom:20px;
}

.alumnos-container{
    max-height:450px;
    overflow-y:auto;
    border:1px solid #333;
    border-radius:10px;
    padding:10px;
    background:#121212;
}

.alumno-item{
    padding:10px;
    border-bottom:1px solid #2b2b2b;
    display:flex;
    align-items:center;
    gap:10px;
}

.alumno-item:last-child{
    border-bottom:none;
}

.alumno-item:hover{
    background:#1d1d1d;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.btn-primary{
    background:#f7c600;
    color:#000;
}

.btn-primary:hover{
    background:#ffd93d;
}

.btn-portal{
    background:#00c853;
    color:white;
    margin-top:15px;
}

.btn-portal:hover{
    background:#00e676;
}

.loading{
    text-align:center;
    padding:20px;
}

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:#1e1e1e;
    padding:30px;
    border-radius:15px;
    width:90%;
    max-width:400px;
    text-align:center;
    border:1px solid #444;
}

.modal-content h2{
    margin-bottom:15px;
    color:#f7c600;
}

.modal-content p{
    margin-bottom:20px;
}

.counter{
    margin-bottom:15px;
    color:#bbb;
    font-size:14px;
}

</style>
</head>

<body>

<div class="container">

    <h1>Asignar Retos a Alumnos</h1>

    <div class="card">

        <label>Nombre del reto</label>
        <input 
    type="text" 
    id="nombreReto" 
    placeholder="Ejemplo: Copa Regia 2026"
    style="text-transform: uppercase;"
>

        <label>Puntos</label>
        <input type="number" id="puntos" placeholder="Ejemplo: 50">

        <div class="search-box">
            <label>Buscar alumno</label>
            <input type="text" id="buscarAlumno" placeholder="Escribe un nombre...">
        </div>

        <div class="counter" id="contadorSeleccionados">
            0 alumnos seleccionados
        </div>

        <div class="alumnos-container" id="listaAlumnos">
            <div class="loading">Cargando alumnos...</div>
        </div>

        <br>

        <button class="btn-primary" onclick="agregarPuntos()">
            Agregar puntos
        </button>

    </div>

</div>

<div class="modal" id="modalExito">
    <div class="modal-content">

        <h2>Proceso completado</h2>

        <p id="mensajeExito"></p>

        <button class="btn-portal" onclick="irPortal()">
            Ir al portal
        </button>

    </div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwX5w8iiwkJVbGtpz-5f20U9jue2MC0vouE3blkHXo9CIMqg9bvCZrAYE8WKxH4gXGWzg/exec";

let alumnos = [];
    document.getElementById("nombreReto").addEventListener("input", function () {
    this.value = this.value.toUpperCase();
});

async function cargarAlumnos(){

    try{

        const response = await fetch(API_URL);
        const data = await response.json();

        if(!data.alumnos){
            throw new Error("No se pudieron cargar alumnos");
        }

        alumnos = data.alumnos.sort((a,b)=>
            a.nombre.localeCompare(b.nombre,'es',{sensitivity:'base'})
        );

        renderizarAlumnos(alumnos);

    }catch(error){

        document.getElementById("listaAlumnos").innerHTML = `
            <div class="loading">
                Error al cargar alumnos
            </div>
        `;

        console.error(error);
    }
}

function renderizarAlumnos(lista){

    const container = document.getElementById("listaAlumnos");

    if(lista.length === 0){

        container.innerHTML = `
            <div class="loading">
                No se encontraron alumnos
            </div>
        `;

        return;
    }

    container.innerHTML = "";

    lista.forEach(alumno=>{

        const div = document.createElement("div");
        div.className = "alumno-item";

        div.innerHTML = `
            <input type="checkbox" class="checkAlumno" value="${alumno.nombre}">
            <span>${alumno.nombre}</span>
        `;

        container.appendChild(div);
    });

    actualizarContador();

    document.querySelectorAll(".checkAlumno").forEach(check=>{
        check.addEventListener("change", actualizarContador);
    });
}

function actualizarContador(){

    const seleccionados = document.querySelectorAll(".checkAlumno:checked").length;

    document.getElementById("contadorSeleccionados").innerText =
        seleccionados + " alumnos seleccionados";
}

document.getElementById("buscarAlumno").addEventListener("input", function(){

    const texto = this.value.toLowerCase();

    const filtrados = alumnos.filter(alumno =>
        alumno.nombre.toLowerCase().includes(texto)
    );

    renderizarAlumnos(filtrados);
});

async function agregarPuntos(){

    const nombreReto = document.getElementById("nombreReto").value.trim();
    const puntos = document.getElementById("puntos").value.trim();

    const checks = document.querySelectorAll(".checkAlumno:checked");

    if(nombreReto === ""){
        alert("Introduce el nombre del reto");
        return;
    }

    if(puntos === ""){
        alert("Introduce los puntos");
        return;
    }

    if(checks.length === 0){
        alert("Selecciona al menos un alumno");
        return;
    }

    const boton = document.querySelector(".btn-primary");

    boton.disabled = true;
    boton.innerText = "Procesando...";

    let enviados = 0;

    try{

        for(const check of checks){

            const body = {
                nombre_alumno: check.value,
                nombre_reto: nombreReto,
                puntos: puntos
            };

            await fetch(API_URL,{
                method:"POST",
                headers:{
                    "Content-Type":"text/plain;charset=utf-8"
                },
                body: JSON.stringify(body)
            });

            enviados++;
        }

        document.getElementById("mensajeExito").innerText =
            "Puntos agregados exitosamente a " + enviados + " alumnos";

        document.getElementById("modalExito").style.display = "flex";

    }catch(error){

        console.error(error);
        alert("Ocurrió un error al agregar puntos");

    }finally{

        boton.disabled = false;
        boton.innerText = "Agregar puntos";
    }
}

function irPortal(){
    window.location.href = "https://americordzn-karate.github.io/retos/";
}

cargarAlumnos();

</script>

</body>
</html>
```
