<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administración Masiva de Puntos - Senshi-Kan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-brand-black { background-color: #1a1a1a; }
        .text-brand-gold { color: #d4af37; }
        .bg-brand-gold { background-color: #d4af37; }
        .border-brand-gold { border-color: #d4af37; }
        
        /* Estilos para el modal/ventana flotante */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <header class="bg-brand-black text-white py-6 shadow-md text-center border-b-4 border-brand-gold">
        <h1 class="text-3xl font-bold tracking-wider text-brand-gold text-center">PANEL DE ADMINISTRACIÓN</h1>
        <p class="text-gray-400 text-sm mt-1">Asignación Masiva de Puntos a Retos</p>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <section class="bg-white rounded-lg p-6 shadow-sm mb-6 border-t-4 border-brand-black">
            <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                ⚙️ <span class="tracking-wide">CONFIGURACIÓN DEL PUNTAJE</span>
            </h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="nombreReto" class="block text-xs font-bold text-gray-700 uppercase mb-1 tracking-wider">Nombre del Reto:</label>
                    <input 
                        type="text" 
                        id="nombreReto" 
                        placeholder="Ej. PUNCH, RELACIONA PALABRAS" 
                        class="w-full border-2 border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-brand-black transition-colors"
                    >
                </div>
                <div>
                    <label for="puntosReto" class="block text-xs font-bold text-gray-700 uppercase mb-1 tracking-wider">Puntos a Asignar:</label>
                    <input 
                        type="number" 
                        id="puntosReto" 
                        placeholder="Ej. 3" 
                        min="0"
                        class="w-full border-2 border-gray-300 rounded px-3 py-2 focus:outline-none focus:border-brand-black transition-colors"
                    >
                </div>
            </div>
        </section>

        <section class="bg-white rounded-lg p-6 shadow-sm border-t-4 border-brand-gold">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mb-4 border-b pb-3">
                <h2 class="text-xl font-bold text-gray-800 flex items-center gap-2">
                    🥋 <span class="tracking-wide">SELECCIÓN DE ALUMNOS</span>
                </h2>
                <div class="flex gap-2">
                    <button id="btnSeleccionarTodos" class="text-xs font-bold bg-gray-200 text-gray-700 px-3 py-1.5 rounded hover:bg-gray-300 transition-colors">Seleccionar Todos</button>
                    <button id="btnDesmarcarTodos" class="text-xs font-bold bg-gray-200 text-gray-700 px-3 py-1.5 rounded hover:bg-gray-300 transition-colors">Desmarcar Todos</button>
                </div>
            </div>

            <div id="estadoCarga" class="text-center py-8 text-gray-500 font-semibold">
                <div class="animate-spin inline-block w-6 height-6 border-[3px] border-current border-t-transparent text-brand-gold rounded-full mr-2" role="status"></div>
                Cargando alumnos vigentes...
            </div>

            <div id="mensajeError" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm font-semibold"></div>

            <div id="contenedorAlumnos" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 max-h-96 overflow-y-auto p-1">
                </div>

            <div class="mt-6 border-t pt-4 flex justify-end">
                <button 
                    id="btnGuardarPuntos" 
                    disabled
                    class="bg-brand-black text-brand-gold font-bold py-3 px-6 rounded tracking-wide border border-brand-gold opacity-50 cursor-not-allowed hover:bg-neutral-800 transition-all uppercase text-sm"
                >
                    Inyectar Puntos Masivamente
                </button>
            </div>
        </section>
    </main>

    <div id="modalExito" class="hidden modal-overlay">
        <div class="bg-white rounded-lg p-6 shadow-xl max-w-md w-full mx-4 text-center border-t-4 border-brand-gold">
            <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-3xl">🏆</span>
            </div>
            <h3 id="modalMensaje" class="text-xl font-bold text-gray-800 mb-6">Puntos agregados exitosamente</h3>
            <a 
                href="https://americordzn-karate.github.io/retos/" 
                class="block w-full text-center bg-brand-black text-brand-gold font-bold py-3 px-4 rounded tracking-wide border border-brand-gold hover:bg-neutral-800 transition-colors"
            >
                Volver al Portal de Retos
            </a>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwX5w8iiwkJVbGtpz-5f20U9jue2MC0vouE3blkHXo9CIMqg9bvCZrAYE8WKxH4gXGWzg/exec";
        
        let alumnosVigentes = [];

        // Elementos de la interfaz
        const contenedorAlumnos = document.getElementById("contenedorAlumnos");
        const estadoCarga = document.getElementById("estadoCarga");
        const mensajeError = document.getElementById("mensajeError");
        const btnGuardarPuntos = document.getElementById("btnGuardarPuntos");
        const nombreRetoInput = document.getElementById("nombreReto");
        const puntosRetoInput = document.getElementById("puntosReto");
        
        const modalExito = document.getElementById("modalExito");
        const modalMensaje = document.getElementById("modalMensaje");

        // Cargar los alumnos al inicializar la página
        window.addEventListener("DOMContentLoaded", obtenerAlumnos);

        async function obtenerAlumnos() {
    try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error("No se pudo conectar con el servidor de Google AppScript.");
        
        const data = await response.json();
        console.log("Datos recibidos del servidor:", data); // Esto te permitirá auditar la respuesta real en la consola de desarrollador (F12)

        // 1. Validar si el Apps Script devolvió un error controlado en su propio catch
        if (data && data.success === false) {
            throw new Error(data.error || "El servidor reportó un error interno.");
        }
        
        // 2. Extraer la lista de alumnos tolerando variaciones en la estructura
        if (data && data.listaAlumnos) {
            alumnosVigentes = data.listaAlumnos;
        } else if (Array.isArray(data)) {
            // Por si acaso el script llegara a devolver el arreglo de alumnos de forma directa
            alumnosVigentes = data;
        } else {
            throw new Error("No se encontró la propiedad 'listaAlumnos' en la respuesta del servidor.");
        }
        
        // 3. Normalizar propiedades internas (Por si acaso viene 'nombre_alumno' o 'nombre')
        alumnosVigentes = alumnosVigentes.map(al => {
            return {
                nombre: al.nombre || al.nombre_alumno || al.Nombre || "Alumno sin nombre",
                estatus: al.estatus !== undefined ? al.estatus : true
            };
        });

        // 4. Ordenar alfabéticamente en orden ascendente por el campo Nombre
        alumnosVigentes.sort((a, b) => a.nombre.localeCompare(b.nombre));
        
        // Ejecutar el dibujado de los checkboxes en la página
        renderizarAlumnos();

    } catch (error) {
        console.error(error);
        estadoCarga.classList.add("hidden");
        // Muestra el verdadero motivo del error mapeado para corregirlo rápido
        mensajeError.textContent = "⚙️ Fallo al cargar alumnos: " + error.message;
        mensajeError.classList.remove("hidden");
    }
}

        function renderizarAlumnos() {
            estadoCarga.classList.add("hidden");
            contenedorAlumnos.innerHTML = "";

            if (alumnosVigentes.length === 0) {
                contenedorAlumnos.innerHTML = "<p class='col-span-full text-center text-gray-500'>No se encontraron alumnos vigentes activos.</p>";
                contenedorAlumnos.classList.remove("hidden");
                return;
            }

            alumnosVigentes.forEach((alumno, index) => {
                const div = document.createElement("div");
                div.className = "flex items-center gap-3 p-3 bg-gray-50 border border-gray-200 rounded hover:bg-gray-100 transition-colors cursor-pointer";
                
                // Permitir hacer clic en todo el recuadro para seleccionar el checkbox
                div.addEventListener("click", (e) => {
                    if (e.target.tagName !== "INPUT") {
                        const checkbox = div.querySelector("input");
                        checkbox.checked = !checkbox.checked;
                    }
                });

                div.innerHTML = `
                    <input 
                        type="checkbox" 
                        value="${alumno.nombre}" 
                        id="alumno_${index}" 
                        class="w-4 h-4 text-brand-black border-gray-300 rounded focus:ring-brand-black accent-neutral-800"
                    >
                    <label for="alumno_${index}" class="text-sm font-medium text-gray-700 cursor-pointer select-none truncate">
                        ${alumno.nombre}
                    </label>
                `;
                contenedorAlumnos.appendChild(div);
            });

            contenedorAlumnos.classList.remove("hidden");
            
            // Habilitar el botón principal de guardado
            btnGuardarPuntos.disabled = false;
            btnGuardarPuntos.classList.remove("opacity-50", "cursor-not-allowed");
        }

        // Lógica de Selección Global
        document.getElementById("btnSeleccionarTodos").addEventListener("click", () => {
            const checkboxes = contenedorAlumnos.querySelectorAll("input[type='checkbox']");
            checkboxes.forEach(cb => cb.checked = true);
        });

        document.getElementById("btnDesmarcarTodos").addEventListener("click", () => {
            const checkboxes = contenedorAlumnos.querySelectorAll("input[type='checkbox']");
            checkboxes.forEach(cb => cb.checked = false);
        });

        // Evento de Inyección Masiva
        btnGuardarPuntos.addEventListener("click", async () => {
            const nombreReto = nombreRetoInput.value.trim();
            const puntos = puntosRetoInput.value.trim();
            
            // Obtener todos los checkboxes seleccionados
            const checkboxesSeleccionados = contenedorAlumnos.querySelectorAll("input[type='checkbox']:checked");
            
            // Validaciones básicas
            if (!nombreReto) {
                alert("Por favor, introduce el Nombre del Reto.");
                nombreRetoInput.focus();
                return;
            }
            if (!puntos || isNaN(puntos)) {
                alert("Por favor, introduce un número válido para los Puntos.");
                puntosRetoInput.focus();
                return;
            }
            if (checkboxesSeleccionados.length === 0) {
                alert("Debes seleccionar al menos un alumno de la lista.");
                return;
            }

            // Deshabilitar botón durante el proceso para evitar duplicados
            btnGuardarPuntos.disabled = true;
            btnGuardarPuntos.textContent = "Procesando inyección...";
            btnGuardarPuntos.classList.add("opacity-50");

            let conteoExitoso = 0;
            
            // Mapeamos las promesas de envío de datos individuales para ejecutarlas en paralelo
            const solicitudes = Array.from(checkboxesSeleccionados).map(async (cb) => {
                const nombreAlumno = cb.value;
                
                // Formateamos los parámetros como x-www-form-urlencoded para que coincidan con e.parameter en doPost()
                const dataEnvio = new URLSearchParams();
                dataEnvio.append("nombre_alumno", nombreAlumno);
                dataEnvio.append("nombre_reto", nombreReto);
                dataEnvio.append("puntos", puntos);

                try {
                    // Usamos modo 'no-cors' para alinearlo con las peticiones de los demás retos del ecosistema
                    await fetch(API_URL, {
                        method: "POST",
                        mode: "no-cors",
                        headers: {
                            "Content-Type": "application/x-www-form-urlencoded"
                        },
                        body: dataEnvio.toString()
                    });
                    conteoExitoso++;
                } catch (error) {
                    console.error("Error inyectando puntos para " + nombreAlumno, error);
                }
            });

            // Esperar a que se procesen todas las llamadas individuales
            await Promise.all(solicitudes);

            // Mostrar el Modal Personalizado con los resultados requeridos
            modalMensaje.textContent = "Puntos agregados exitosamente a " + conteoExitoso + " alumnos";
            modalExito.classList.remove("hidden");

            // Restablecer el botón
            btnGuardarPuntos.disabled = false;
            btnGuardarPuntos.textContent = "Inyectar Puntos Masivamente";
            btnGuardarPuntos.classList.remove("opacity-50");
        });
    </script>
</body>
</html>
